version: '3.8'

services:
  redis:
    image: redis:7.2-alpine
    container_name: demo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: demo-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    command: start-dev
    restart: always

volumes:
  redis_data: